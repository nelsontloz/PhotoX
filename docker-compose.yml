services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: photox
      POSTGRES_PASSWORD: photox_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U photox']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - photox-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: photox
      MINIO_ROOT_PASSWORD: photox_dev
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - photox-net

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      USER_SERVICE_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: photox
      POSTGRES_PASSWORD: photox_dev
      AUTH_ACCESS_TTL: 30m
      AUTH_REFRESH_TTL: 30d
      AUTH_TOKEN_SECRET: dev-auth-secret-32-characters-minimum!!
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - photox-net

  media-service:
    build:
      context: .
      dockerfile: apps/media-service/Dockerfile
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      MEDIA_SERVICE_PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: photox
      POSTGRES_PASSWORD: photox_dev
      FILE_STORAGE_SERVICE_URL: http://file-storage-service:3003
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - photox-net

  file-storage-service:
    build:
      context: .
      dockerfile: apps/file-storage-service/Dockerfile
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      FILE_STORAGE_SERVICE_PORT: 3003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: photox
      POSTGRES_PASSWORD: photox_dev
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: photox
      MINIO_ROOT_PASSWORD: photox_dev
      MINIO_BUCKET: photox-files
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3003/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - photox-net

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: production
      WORKER_SERVICE_PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: photox
      POSTGRES_PASSWORD: photox_dev
      FILE_STORAGE_SERVICE_URL: http://file-storage-service:3003
      MEDIA_SERVICE_URL: http://media-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      file-storage-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3004/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - photox-net

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      MEDIA_SERVICE_URL: http://media-service:3002
      FILE_STORAGE_SERVICE_URL: http://file-storage-service:3003
      AUTH_TOKEN_SECRET: dev-auth-secret-32-characters-minimum!!
    depends_on:
      user-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      file-storage-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - photox-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://gateway:3000
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - photox-net

volumes:
  pgdata:
  minio-data:

networks:
  photox-net:
    driver: bridge
